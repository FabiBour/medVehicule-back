openapi: 3.0.3
info:
  title: MedVehicule API
  description: |
    API REST de gestion de flotte de véhicules hospitaliers.
    Authentification via Firebase Auth : le client envoie le Firebase ID token dans le header Authorization Bearer.
    Rôles : 0=usager, 1=gestionnaire, 2=admin, 3=super_admin.
    Un utilisateur avec isDeactivated=true ne peut pas se connecter (401).
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Serveur local

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Firebase ID Token
      description: Token Firebase (ID token) obtenu après connexion via Firebase Auth
  schemas:
    Hospital:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        address: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
    VehicleType:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
    Vehicle:
      type: object
      description: En lecture, `hospitals` remplace `hospital` et `hospitalId`.
      properties:
        id: { type: string }
        vehicleTypeId: { type: string }
        registration: { type: string, nullable: true }
        brand: { type: string, nullable: true }
        model: { type: string, nullable: true }
        year: { type: integer, nullable: true }
        vehicleType: { $ref: '#/components/schemas/VehicleType' }
        hospitals:
          type: array
          items: { $ref: '#/components/schemas/Hospital' }
    User:
      type: object
      properties:
        id: { type: string, description: "Firebase UID" }
        email: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        role: { type: integer, enum: [0, 1, 2, 3], description: "0=usager, 1=gestionnaire, 2=admin, 3=super_admin" }
        isDeactivated: { type: boolean, description: "Compte désactivé (ne peut plus se connecter)" }
        hospitals:
          type: array
          description: "Établissements affectés (remplace hospitalId / hospitalIds / hospital en lecture)"
          items: { $ref: '#/components/schemas/Hospital' }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    Booking:
      type: object
      properties:
        id: { type: string }
        vehicleId: { type: string }
        userId: { type: string }
        startDate: { type: string, format: date-time }
        endDate: { type: string, format: date-time, nullable: true }
        odometerStart: { type: integer, nullable: true }
        odometerEnd: { type: integer, nullable: true }
        status: { type: string, enum: [planned, in_progress, completed, cancelled] }
        notes: { type: string, nullable: true }
    ProblemReport:
      type: object
      properties:
        id: { type: string }
        vehicleId: { type: string }
        type: { type: string, enum: [rayure, impact, panne, autre] }
        description: { type: string, nullable: true }
        severity: { type: string, enum: [mineur, moyen, majeur], nullable: true }
        status: { type: string, enum: [ouvert, en_cours, cloture] }
    Maintenance:
      type: object
      properties:
        id: { type: string }
        vehicleId: { type: string }
        type: { type: string, enum: [controle_technique, revision, reparation, autre] }
        scheduledAt: { type: string, format: date-time, nullable: true }
        performedAt: { type: string, format: date-time, nullable: true }
        status: { type: string, enum: [planifie, en_cours, termine, reporte] }
    Vehicle3D:
      type: object
      properties:
        id: { type: string }
        vehicleId: { type: string }
        format: { type: string, enum: [glb, gltf] }
        url: { type: string, description: "URL du fichier 3D" }

paths:
  /health:
    get:
      summary: Santé de l'API
      tags: [Système]
      responses:
        '200': { description: OK }
  /api/auth/login:
    post:
      summary: Connexion avec email et mot de passe
      description: Retourne l'idToken Firebase pour les requêtes authentifiées (Authorization Bearer).
      tags: [Authentification]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: Connexion réussie
          content:
            application/json:
              schema:
                type: object
                properties:
                  idToken: { type: string, description: "Token à utiliser dans Authorization Bearer" }
                  refreshToken: { type: string }
                  expiresIn: { type: string }
                  localId: { type: string }
        '401': { description: Email ou mot de passe incorrect }
        '503': { description: FIREBASE_WEB_API_KEY non configuré }
  /api/auth/refresh:
    post:
      summary: Reconnexion avec refresh token
      description: |
        Échange le refreshToken contre un nouvel idToken et refreshToken.
        À appeler lorsque l'idToken expire (typiquement après 1h).
        Retourne le même format que login.
      tags: [Authentification]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          description: Tokens renouvelés
          content:
            application/json:
              schema:
                type: object
                properties:
                  idToken: { type: string }
                  refreshToken: { type: string }
                  expiresIn: { type: string }
                  localId: { type: string }
        '401': { description: Refresh token expiré ou compte désactivé }
        '503': { description: FIREBASE_WEB_API_KEY non configuré }
  /api/auth/register:
    post:
      summary: Création de compte avec email et mot de passe
      description: |
        Crée l'utilisateur dans Firebase Auth et le profil dans Firestore.
        Retourne l'idToken pour connexion immédiate.
        Rôle attribué : 0 (usager).
      tags: [Authentification]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, firstName, lastName]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 6 }
                firstName: { type: string }
                lastName: { type: string }
                hospitalId: { type: string, nullable: true }
      responses:
        '201':
          description: Compte créé (même format que login)
          content:
            application/json:
              schema:
                type: object
                properties:
                  idToken: { type: string, description: "Token à utiliser dans Authorization Bearer" }
                  refreshToken: { type: string }
                  expiresIn: { type: string }
                  localId: { type: string }
        '409': { description: Email déjà utilisé }
        '400': { description: Données invalides (mot de passe trop faible, etc.) }
  /api/auth/me:
    get:
      summary: Utilisateur courant
      description: Retourne le profil (id, email, firstName, lastName, role, isDeactivated, hospitals).
      tags: [Authentification]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Profil utilisateur
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { description: Token manquant, invalide, expiré ou compte désactivé }
  /api/hospitals:
    get:
      summary: Liste des établissements
      description: Tous les utilisateurs authentifiés. Admin et super_admin voient tous les établissements.
      tags: [Établissements]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Liste des établissements
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Hospital' }
    post:
      summary: Créer un établissement
      description: Requiert admin (2), gestionnaire (1) ou super_admin (3).
      tags: [Établissements]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                address: { type: string }
      responses:
        '201': { description: Créé }
        '401': { description: Token manquant, invalide ou compte désactivé }
        '403': { description: Droits gestionnaire/admin/super_admin requis }
  /api/hospitals/{id}:
    get:
      summary: Détail établissement
      tags: [Établissements]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
        '401': { description: Token manquant, invalide ou compte désactivé }
        '403': { description: Accès refusé (établissement d'un autre hôpital) }
    patch:
      summary: Modifier établissement
      tags: [Établissements]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                address: { type: string }
      responses:
        '200': { description: OK }
  /api/vehicle-types:
    get:
      summary: Liste des types de véhicules
      tags: [Types de véhicules]
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Liste }
    post:
      summary: Créer un type
      tags: [Types de véhicules]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                description: { type: string }
      responses:
        '201': { description: Créé }
  /api/vehicle-types/{id}:
    get:
      summary: Détail type
      tags: [Types de véhicules]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
    patch:
      summary: Modifier type
      tags: [Types de véhicules]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: string }
      responses:
        '200': { description: OK }
  /api/vehicles:
    get:
      summary: Liste des véhicules
      tags: [Véhicules]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: hospitalId
          in: query
          schema: { type: string }
        - name: vehicleTypeId
          in: query
          schema: { type: string }
        - name: available
          in: query
          schema: { type: string, enum: [true, false] }
      responses:
        '200': { description: Liste }
    post:
      summary: Créer un véhicule
      tags: [Véhicules]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [hospitalId, vehicleTypeId]
              properties:
                hospitalId: { type: string }
                vehicleTypeId: { type: string }
                registration: { type: string }
                brand: { type: string }
                model: { type: string }
                year: { type: integer }
      responses:
        '201': { description: Créé }
  /api/vehicles/{vehicleId}:
    get:
      summary: Détail véhicule
      tags: [Véhicules]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
    patch:
      summary: Modifier véhicule
      tags: [Véhicules]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                registration: { type: string }
                brand: { type: string }
                model: { type: string }
                year: { type: integer }
                vehicleTypeId: { type: string }
      responses:
        '200': { description: OK }
    delete:
      summary: Supprimer véhicule
      tags: [Véhicules]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema: { type: string }
      responses:
        '204': { description: Supprimé }
  /api/vehicles/{vehicleId}/history:
    get:
      summary: Historique du véhicule
      description: Prises, interventions et entretiens
      tags: [Véhicules]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
  /api/users:
    get:
      summary: Liste des utilisateurs
      description: Admin et super_admin voient tous les utilisateurs. Gestionnaire et usager voient ceux de leur établissement.
      tags: [Utilisateurs]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Liste des utilisateurs
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/User' }
    post:
      summary: Créer un utilisateur (admin uniquement)
      description: "Crée l'utilisateur dans Firebase Auth et le profil Firestore. Requiert role 2 (admin). Rôles créables 0, 1, 2, 3."
      tags: [Utilisateurs]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [hospitalId, email, password, firstName, lastName, role]
              properties:
                hospitalId: { type: string }
                email: { type: string, format: email }
                password: { type: string, minLength: 6 }
                firstName: { type: string }
                lastName: { type: string }
                role: { type: integer, enum: [0, 1, 2, 3], description: "0=usager, 1=gestionnaire, 2=admin, 3=super_admin" }
      responses:
        '201': { description: Créé }
        '401': { description: Token manquant, invalide ou compte désactivé }
        '403': { description: Droits admin requis }
  /api/users/{id}/role:
    patch:
      summary: Modifier le rôle d'un utilisateur (admin uniquement)
      description: Requiert role 2 (admin).
      tags: [Utilisateurs]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { type: integer, enum: [0, 1, 2, 3] }
      responses:
        '200': { description: OK }
        '403': { description: Droits admin requis }
  /api/users/{id}/deactivate:
    patch:
      summary: Activer ou désactiver un utilisateur (admin ou super_admin)
      description: Requiert role 2 (admin) ou 3 (super_admin). Un admin ne peut pas désactiver son propre compte.
      tags: [Utilisateurs]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [isDeactivated]
              properties:
                isDeactivated: { type: boolean }
      responses:
        '200': { description: OK }
        '400': { description: Impossible de désactiver son propre compte }
        '403': { description: Droits administrateur requis }
        '404': { description: Utilisateur introuvable }
  /api/users/{id}/hospitals:
    patch:
      summary: Affecter un usager ou gestionnaire à un ou plusieurs hôpitaux (super_admin uniquement)
      description: Requiert role 3 (super_admin). Seuls les usagers (0) et gestionnaires (1) peuvent être affectés. hospitalId est défini sur le premier élément de hospitalIds.
      tags: [Utilisateurs]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [hospitalIds]
              properties:
                hospitalIds: { type: array, items: { type: string }, minItems: 1 }
      responses:
        '200': { description: OK }
        '400': { description: Utilisateur non éligible ou hôpital introuvable }
        '403': { description: Droits super administrateur requis }
        '404': { description: Utilisateur introuvable }
  /api/authorizations:
    get:
      summary: Liste des droits d'utilisation
      tags: [Autorisations]
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Liste }
    post:
      summary: Accorder un droit
      tags: [Autorisations]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [userId, vehicleTypeId]
              properties:
                userId: { type: string }
                vehicleTypeId: { type: string }
                expiresAt: { type: string, format: date-time }
      responses:
        '201': { description: Créé }
  /api/authorizations/user/{userId}:
    get:
      summary: Droits d'un utilisateur
      tags: [Autorisations]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
  /api/authorizations/{id}/revoke:
    post:
      summary: Révoquer un droit
      tags: [Autorisations]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
  /api/bookings:
    get:
      summary: Liste des réservations
      tags: [Réservations]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: vehicleId
          in: query
          schema: { type: string }
        - name: userId
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [planned, in_progress, completed, cancelled] }
      responses:
        '200': { description: Liste }
    post:
      summary: Créer une réservation
      tags: [Réservations]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [vehicleId, startDate]
              properties:
                vehicleId: { type: string }
                startDate: { type: string, format: date-time }
                endDate: { type: string, format: date-time }
                notes: { type: string }
      responses:
        '201': { description: Créé }
  /api/bookings/{id}:
    get:
      summary: Détail réservation
      tags: [Réservations]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
  /api/bookings/{id}/start:
    patch:
      summary: Démarrer la prise
      tags: [Réservations]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                odometerStart: { type: integer, minimum: 0 }
      responses:
        '200': { description: OK }
  /api/bookings/{id}/complete:
    patch:
      summary: Terminer la prise (restitution)
      tags: [Réservations]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [odometerEnd]
              properties:
                odometerEnd: { type: integer, minimum: 0 }
                notes: { type: string }
      responses:
        '200': { description: OK }
  /api/bookings/{id}/cancel:
    patch:
      summary: Annuler une réservation
      tags: [Réservations]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
  /api/photos/vehicle/{vehicleId}:
    get:
      summary: Photos d'un véhicule
      tags: [Photos]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Liste }
    post:
      summary: Ajouter une photo
      description: multipart/form-data - photo (fichier), label, bookingId
      tags: [Photos]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                photo: { type: string, format: binary }
                label: { type: string }
                bookingId: { type: string }
      responses:
        '201': { description: Créé }
  /api/photos/{photoId}:
    delete:
      summary: Supprimer une photo
      tags: [Photos]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: photoId
          in: path
          required: true
          schema: { type: string }
      responses:
        '204': { description: Supprimé }
  /api/problem-reports:
    get:
      summary: Liste des signalements
      tags: [Signalements]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: vehicleId
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [ouvert, en_cours, cloture] }
      responses:
        '200': { description: Liste }
    post:
      summary: Créer un signalement
      tags: [Signalements]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [vehicleId, type]
              properties:
                vehicleId: { type: string }
                type: { type: string, enum: [rayure, impact, panne, autre] }
                description: { type: string }
                severity: { type: string, enum: [mineur, moyen, majeur] }
                bookingId: { type: string }
                photoIds: { type: array, items: { type: string } }
      responses:
        '201': { description: Créé }
  /api/problem-reports/{id}:
    get:
      summary: Détail signalement
      tags: [Signalements]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
    patch:
      summary: Modifier signalement
      tags: [Signalements]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string, enum: [ouvert, en_cours, cloture] }
                description: { type: string }
      responses:
        '200': { description: OK }
  /api/odometer/vehicle/{vehicleId}:
    get:
      summary: Relevés compteur
      tags: [Compteur]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        '200': { description: Liste }
    post:
      summary: Enregistrer un relevé
      tags: [Compteur]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value: { type: integer, minimum: 0 }
                bookingId: { type: string }
      responses:
        '201': { description: Créé }
  /api/maintenance:
    get:
      summary: Liste des entretiens
